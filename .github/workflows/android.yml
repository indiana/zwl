name: Android Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.7'

    - name: Build APKs and Bundle
      run: gradle :app:assembleDebug :app:assembleRelease :app:bundleRelease

    - name: Sign Release Build
      env:
        SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
        SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
      run: |
        echo "$SIGNING_KEY" | base64 --decode > release.keystore
        
        # Sign AAB
        AAB_FILE=$(ls app/build/outputs/bundle/release/*.aab | head -n 1)
        jarsigner -keystore release.keystore -storepass "$SIGNING_STORE_PASSWORD" -keypass "$SIGNING_KEY_PASSWORD" "$AAB_FILE" "$SIGNING_KEY_ALIAS"
        
        # Sign APK
        APK_FILE=$(ls app/build/outputs/apk/release/*-unsigned.apk | head -n 1)
        BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
        $BUILD_TOOLS/apksigner sign --ks release.keystore --ks-pass "env:SIGNING_STORE_PASSWORD" --key-pass "env:SIGNING_KEY_PASSWORD" --ks-key-alias "$SIGNING_KEY_ALIAS" "$APK_FILE"
        
        SIGNED_APK="${APK_FILE/-unsigned/}"
        mv "$APK_FILE" "$SIGNED_APK"
        
        # Clean up keystore
        rm release.keystore

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release/app-release.apk

    - name: Upload Release Bundle (AAB)
      uses: actions/upload-artifact@v4
      with:
        name: app-release-bundle
        path: app/build/outputs/bundle/release/*.aab
